<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUTH REALM</title>

  <!-- Pixel font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css" />

  <!-- okta-auth-js: try local build first, CDN fallback handled in app.js -->
  <script src="/okta-auth-js.min.js"></script>
  <script>
    // CDN fallback if local build is not available
    if (typeof OktaAuth === 'undefined') {
      document.write('<script src="https://global.oktacdn.com/okta-auth-js/7.4.3/okta-auth-js.min.js"><\/script>');
    }
  </script>
</head>
<body>

  <!-- Star field -->
  <div class="stars" id="stars"></div>

  <!-- ============================================================
       LOADING SCREEN
  ============================================================ -->
  <div id="screen-loading" class="screen active">
    <div class="px-spinner"></div>
    <div class="loading-text">LOADING<span class="cursor"></span></div>
  </div>

  <!-- ============================================================
       LOGIN SCREEN
  ============================================================ -->
  <div id="screen-login" class="screen">

    <div class="pixel-hero">
      <canvas id="hero-canvas" width="20" height="20"></canvas>
    </div>

    <div class="login-card pixel-box--accent">
      <h1 class="login-title">AUTH<span style="color:var(--accent)">REALM</span></h1>
      <p class="login-subtitle">// SECURE LOGIN PORTAL v1.0 //</p>
      <!-- Custom form (direct username/password via OIDC password grant is
           not recommended — we use Okta-hosted redirect for production.
           The form below triggers the redirect flow for maximum security.) -->
      <button class="pixel-btn" id="btn-login-redirect">
        &gt; LOGIN WITH OKTA
      </button>

      <div class="divider">OR</div>

      <div class="field">
        <label for="inp-username">USERNAME</label>
        <input id="inp-username" type="email" placeholder="hero@example.com" autocomplete="username" />
      </div>

      <div class="field">
        <label for="inp-password">PASSWORD</label>
        <input id="inp-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="pixel-btn pixel-btn--cyan" id="btn-login-form">
        &gt; SIGN IN
      </button>

      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- ============================================================
       HOME SCREEN
  ============================================================ -->
  <div id="screen-home" class="screen">

    <nav class="navbar">
      <div class="navbar-brand">PIXEL<span>AUTH</span></div>
      <div class="navbar-actions">
        <button class="nav-btn" id="btn-refresh-token">&gt; REFRESH</button>
        <button class="nav-btn nav-btn--danger" id="btn-logout">&gt; LOGOUT</button>
      </div>
    </nav>

    <main class="home-main">

      <!-- Welcome banner -->
      <div class="welcome-banner pixel-box--cyan">
        <p class="welcome-tag">// AUTHENTICATED //</p>
        <p class="welcome-name">WELCOME BACK, <em id="display-name">HERO</em>!</p>
        <p class="welcome-sub">YOUR QUEST CONTINUES...</p>
      </div>

      <!-- User info card -->
      <div class="info-card pixel-box">
        <div class="info-card-title">USER PROFILE</div>
        <div class="info-row">
          <span class="label">NAME</span>
          <span class="value" id="info-name">-</span>
        </div>
        <div class="info-row">
          <span class="label">EMAIL</span>
          <span class="value" id="info-email">-</span>
        </div>
        <div class="info-row">
          <span class="label">SUB</span>
          <span class="value" id="info-sub">-</span>
        </div>
        <div class="info-row">
          <span class="label">LOCALE</span>
          <span class="value" id="info-locale">-</span>
        </div>
      </div>

      <!-- Stats card -->
      <div class="stats-card pixel-box">
        <div class="stats-title">SESSION STATS</div>

        <div class="stat-bar">
          <div class="stat-label">
            <span class="name">TOKEN HEALTH</span>
            <span class="val" id="stat-health-val">100%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" id="stat-health-bar" style="width:100%"></div>
          </div>
        </div>

        <div class="stat-bar">
          <div class="stat-label">
            <span class="name">SCOPES</span>
            <span class="val" id="stat-scopes-val">-</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill yellow" id="stat-scopes-bar" style="width:75%"></div>
          </div>
        </div>

        <div class="stat-bar">
          <div class="stat-label">
            <span class="name">SECURITY</span>
            <span class="val">MAX</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:100%"></div>
          </div>
        </div>
      </div>

      <!-- Token display -->
      <div class="token-card pixel-box">
        <div class="token-card-title">ACCESS TOKEN (raw)</div>
        <div class="token-scroll" id="token-display">-</div>
      </div>

    </main>
  </div>

  <!-- App config -->
  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
